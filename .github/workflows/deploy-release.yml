name: deploy-release

# Triggered by:
#   - release-please.yml (workflow_call) when a release is created
#   - release: published (manual releases only — GITHUB_TOKEN releases do NOT fire this)
#   - workflow_dispatch (manual redeploy)
#
# One-time setup: docs/release-and-deploy.md

on:
  workflow_call:
    inputs:
      tag:
        description: Release tag to deploy
        required: true
        type: string
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to deploy
        required: false
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  deploy-client:
    name: Deploy client to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.event.release.tag_name || github.event.inputs.tag || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build client
        env:
          TAG: ${{ inputs.tag || github.event.release.tag_name || github.event.inputs.tag || github.ref_name }}
          VITE_MANAGER_URL: ${{ vars.VITE_MANAGER_URL != '' && vars.VITE_MANAGER_URL || 'https://server-manager.tronzero.dev' }}
        run: |
          export APP_VERSION="${TAG#tron-zero-}"
          bun run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/client/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-server-manager:
    name: Deploy server-manager to Cloud Run
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.event.release.tag_name || github.event.inputs.tag || github.ref }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          REGION: ${{ secrets.GCP_REGION }}
          TAG: ${{ inputs.tag || github.event.release.tag_name || github.event.inputs.tag || github.ref_name }}
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/tron/server-manager:${TAG}"
          docker build -f Dockerfile.server-manager -t "${IMAGE}" .
          docker push "${IMAGE}"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        env:
          REGION: ${{ secrets.GCP_REGION }}
        run: |
          gcloud run deploy server-manager \
            --image "${IMAGE}" \
            --region "${REGION}" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --min-instances 1