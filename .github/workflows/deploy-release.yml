name: deploy-release

# Runs when a GitHub Release is published (merge the release-please Release PR on main).
# One-time setup:
#   GitHub: Settings → Pages → Source = GitHub Actions
#   GitHub secrets: GCP_PROJECT_ID, GCP_REGION, GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_SERVICE_ACCOUNT
#   GitHub variable: VITE_MANAGER_URL (e.g. https://server-manager.tronzero.dev)
#   GCP project: tron-zero-js — Artifact Registry repo "tron-zero" in europe-west1, WIF (see docs/release-and-deploy.md)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to deploy (defaults to latest release tag)
        required: false
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  deploy-client:
    name: Deploy client to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build client
        env:
          VITE_MANAGER_URL: ${{ vars.VITE_MANAGER_URL || 'https://server-manager.tronzero.dev' }}
          VITE_OTEL_ENABLED: false
          VITE_LOG_LEVEL: INFO
        run: bun run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/client/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-server-manager:
    name: Deploy server-manager to Cloud Run
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag || github.ref }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          REGION: ${{ secrets.GCP_REGION }}
          TAG: ${{ github.event.release.tag_name || inputs.tag || github.ref_name }}
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/tron-zero/server-manager:${TAG}"
          docker build -f Dockerfile.server-manager -t "${IMAGE}" .
          docker push "${IMAGE}"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        env:
          REGION: ${{ secrets.GCP_REGION }}
        run: |
          gcloud run deploy server-manager \
            --image "${IMAGE}" \
            --region "${REGION}" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --min-instances 1